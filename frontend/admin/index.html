<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설문 관리자 | AURI 소규모 주거 전문가 설문</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<!-- Login -->
<div id="login" class="login-wrap">
  <div class="login-box">
    <h2>AURI 소규모 주거 전문가 설문 Admin</h2>
    <p>관리자 인증키를 입력하세요</p>
    <input type="password" id="admin-key-input" placeholder="Admin Key" autofocus>
    <button onclick="doLogin()">로그인</button>
    <p id="login-error" style="color:var(--red);font-size:12px;margin-top:8px"></p>
  </div>
</div>

<!-- App -->
<div id="app" class="app" style="display:none">
  <nav class="sidebar">
    <h1>Survey Admin</h1>
    <p class="subtitle">AURI 소규모 주거 전문가 설문</p>
    <a class="nav-item active" data-page="dashboard">대시보드</a>
    <a class="nav-item" data-page="participants">대상자 관리</a>
    <a class="nav-item" data-page="email">이메일 발송</a>
    <a class="nav-item" data-page="responses">응답 조회</a>
    <a class="nav-item" style="margin-top:auto;color:#666;font-size:12px" onclick="logout()">로그아웃</a>
  </nav>

  <div class="main">
    <!-- Dashboard -->
    <div id="page-dashboard" class="page active">
      <h2 class="page-title">대시보드</h2>
      <div id="stat-cards" class="stat-grid"></div>
      <div id="cat-bars" class="cat-bar"></div>
    </div>

    <!-- Participants -->
    <div id="page-participants" class="page">
      <h2 class="page-title">대상자 관리</h2>
      <div class="table-wrap">
        <div class="table-toolbar">
          <input type="text" id="p-search" placeholder="이름 또는 소속 검색...">
          <select id="p-category">
            <option value="">전체 직군</option>
            <option value="설계">설계</option>
            <option value="시공">시공</option>
            <option value="유지관리">유지관리</option>
            <option value="건축행정">건축행정</option>
            <option value="기타">기타</option>
            <option value="미분류">미분류</option>
          </select>
          <button class="btn btn-outline btn-sm" onclick="exportParticipantLinks()">링크 목록 CSV</button>
        </div>
        <div id="p-table"></div>
        <div id="p-pagination" class="pagination"></div>
      </div>
    </div>

    <!-- Email -->
    <div id="page-email" class="page">
      <h2 class="page-title">이메일 발송</h2>
      <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <select id="e-category">
          <option value="">전체 직군</option>
          <option value="설계">설계</option>
          <option value="시공">시공</option>
          <option value="유지관리">유지관리</option>
          <option value="건축행정">건축행정</option>
        </select>
        <select id="e-filter">
          <option value="unsent">미발송만</option>
          <option value="all">전체</option>
          <option value="sent">발송완료만</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="loadEmailTargets()">조회</button>
        <button class="btn btn-blue btn-sm" id="btn-send" disabled onclick="sendEmails()">선택 대상자에게 발송</button>
        <button class="btn btn-outline btn-sm" onclick="previewEmail()">미리보기</button>
      </div>
      <div class="table-wrap">
        <div id="e-table"></div>
      </div>
      <div id="e-status" style="margin-top:12px;font-size:13px;color:var(--text3)"></div>
      <div id="email-preview" class="email-preview" style="display:none"></div>
    </div>

    <!-- Responses -->
    <div id="page-responses" class="page">
      <h2 class="page-title">응답 조회</h2>
      <div style="display:flex;gap:12px;margin-bottom:16px">
        <select id="r-category">
          <option value="">전체 직군</option>
          <option value="설계">설계</option>
          <option value="시공">시공</option>
          <option value="유지관리">유지관리</option>
          <option value="건축행정">건축행정</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="loadResponses()">조회</button>
        <button class="btn btn-primary btn-sm" onclick="downloadCSV()">CSV 내보내기</button>
      </div>
      <div class="table-wrap">
        <div id="r-table"></div>
      </div>
    </div>
  </div>
</div>

<script>window.SURVEY_API = 'https://alris.ddns.net:8443/small-housing';</script>
<script src="admin.js"></script>
</body>
</html>
