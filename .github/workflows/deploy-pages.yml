name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main, master]
    paths: [frontend/**, .github/workflows/deploy-pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build survey app
        working-directory: frontend
        env:
          VITE_BASE: /auri-small-housing-survey/
          VITE_API_BASE: https://alris.ddns.net:8443/small-housing
        run: |
          npm install
          npm run build

      - name: Copy admin dashboard to dist
        run: cp -r frontend/admin frontend/dist/admin

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
